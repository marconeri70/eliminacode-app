<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gestione Fila</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #2c3e50; color: white; }
        .panel { background: #34495e; padding: 30px; border-radius: 20px; display: inline-block; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .numero-attuale { font-size: 100px; font-weight: bold; color: #2ecc71; margin: 20px 0; }
        .stats { font-size: 18px; margin-bottom: 30px; color: #bdc3c7; }
        button { background: #e74c3c; color: white; border: none; padding: 25px; border-radius: 15px; font-size: 24px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 5px 0 #c0392b; }
        button:active { box-shadow: none; transform: translateY(5px); }
        .refresh { margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Console Medico</h1>
        <p>Dott. Giuseppe Martino</p>
        <p>Numero attualmente servito:</p>
        <div class="numero-attuale" id="curr">--</div>
        
        <div class="stats" id="info-coda">
            Caricamento dati...
        </div>

        <button onclick="prossimo()">CHIAMA PROSSIMO</button>
        
        <div class="refresh" onclick="caricaDati()">Aggiorna manualmente</div>
    </div>

    <script>
        // USA LO STESSO URL DEL TUO WORKER
        const WORKER_URL = "https://tuo-worker.marconeri.workers.dev"; 

        async function caricaDati() {
            try {
                const res = await fetch(`${WORKER_URL}/status`);
                const data = await res.json();
                document.getElementById('curr').innerText = data.attuale;
                
                const inAttesa = data.ultimoAssegnato - data.attuale;
                document.getElementById('info-coda').innerText = `Pazienti ancora in attesa: ${inAttesa > 0 ? inAttesa : 0}`;
            } catch (e) {
                console.error("Errore di connessione");
            }
        }

        async function prossimo() {
            // Piccolo controllo di sicurezza per evitare clic accidentali
            if (!confirm("Vuoi chiamare il prossimo paziente?")) return;

            try {
                const res = await fetch(`${WORKER_URL}/next`, { method: 'POST' });
                const data = await res.json();
                document.getElementById('curr').innerText = data.attuale;
                caricaDati(); // Aggiorna le statistiche
            } catch (e) {
                alert("Errore durante l'avanzamento della fila.");
            }
        }

        // Carica i dati ogni 10 secondi per vedere se arrivano nuovi pazienti
        setInterval(caricaDati, 10000);
        caricaDati();
    </script>
</body>
</html>
