<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Medico - Dott. Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --green: #10b981; --amber: #f59e0b; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, var(--bg));
        }
        .panel { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 40px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        .numero-attuale { 
            font-size: 120px; 
            font-weight: 800; 
            color: var(--green); 
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
            margin: 20px 0;
        }
        .numero-info { color: var(--amber); text-shadow: 0 0 40px rgba(245, 158, 11, 0.3); font-size: 80px; }
        button { 
            font-family: 'Poppins', sans-serif; 
            border: none; 
            padding: 22px; 
            border-radius: 24px; 
            font-size: 18px; 
            font-weight: 800; 
            width: 100%; 
            cursor: pointer; 
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .btn-chiama { 
            background: linear-gradient(to bottom, #10b981, #059669); 
            color: white; 
            border-bottom: 5px solid #047857;
        }
        .btn-chiama:active { border-bottom: 0; transform: translateY(5px); }
        .btn-login { background: #3b82f6; color: white; }
        input { 
            background: #1e293b; 
            border: 2px solid #334155; 
            color: white; 
            font-size: 30px; 
            text-align: center; 
            padding: 15px; 
            border-radius: 20px; 
            width: 80%; 
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="panel" id="login-screen">
        <h2 style="margin:0">Sblocco Console</h2>
        <p style="color:#94a3b8; margin-bottom:25px;">Dott. Giuseppe Martino</p>
        <input type="password" id="pin-input" placeholder="••••" inputmode="numeric">
        <button class="btn-login" onclick="login()">ACCEDI</button>
    </div>

    <div class="panel" id="app-content" style="display:none;">
        <h2 style="margin:0; font-size:16px; color:#94a3b8;">IN VISITA ORA</h2>
        <div class="numero-attuale" id="curr">--</div>
        <p id="stats" style="font-weight:600; color:#cbd5e1; margin-bottom:30px;">⏳ Caricamento...</p>
        <button class="btn-chiama" onclick="next()">🔊 CHIAMA PROSSIMO</button>
        <button style="background:transparent; color:var(--amber); border:2px solid var(--amber); font-size:14px;" onclick="reset()">🔄 AZZERA GIORNATA</button>
    </div>

    <script>
        const WORKER_URL = "https://motore-coda.motore-coda-admin.workers.dev";
        let pin = "";

        async function login() {
            const p = document.getElementById('pin-input').value;
            const res = await fetch(`${WORKER_URL}/check-pin`, { method:'POST', body: JSON.stringify({pin:p}) });
            if ((await res.json()).success) {
                pin = p;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                setInterval(load, 4000); load();
            } else alert("PIN errato");
        }

        async function load() {
            const res = await fetch(`${WORKER_URL}/status`);
            const d = await res.json();
            const curr = document.getElementById('curr');
            if (d.infoInVisita) { curr.innerText = "💼 INFO"; curr.className = "numero-attuale numero-info"; }
            else { curr.innerText = d.ticketAttuale; curr.className = "numero-attuale"; }
            document.getElementById('stats').innerText = `Pazienti in attesa: ${d.ultimoTicket - d.ticketAttuale} | Informatori: ${d.informatoriInCoda}`;
        }

        async function next() { await fetch(`${WORKER_URL}/next`, {method:'POST'}); load(); }
        async function reset() { if(confirm("Azzero tutto?")) { await fetch(`${WORKER_URL}/reset`, {method:'POST'}); load(); } }
    </script>
</body>
</html>
