<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila - Dott. Giuseppe Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #0ea5e9; 
            --success: #10b981; 
            --danger: #f43f5e; 
            --glass: rgba(255, 255, 255, 0.85);
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            padding: 20px;
        }
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
            padding: 40px 30px; 
            border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }
        .numero-attuale { 
            font-size: 100px; 
            font-weight: 900; 
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
            line-height: 1;
        }
        .info-box { 
            background: white; 
            padding: 30px; 
            border-radius: 28px; 
            margin: 25px 0; 
            border: 1px solid #f1f5f9;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tuo-numero { font-size: 60px; font-weight: 800; color: var(--accent); }
        .turno-attivo { 
            background: linear-gradient(135deg, #10b981, #059669) !important; 
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
        }
        .turno-attivo .tuo-numero, .turno-attivo p { color: white !important; }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 22px; 
            border-radius: 20px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.2);
        }
        #reader-container { display: none; margin-top: 15px; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 2px solid var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin:0; font-size: 18px; color: #64748b;">Studio Medico</h2>
        <h1 style="margin:0 0 20px 0; font-size: 24px; font-weight: 800;">Dott. G. Martino</h1>
        
        <p style="margin:0; font-size: 14px; font-weight: 600; color: #94a3b8;">In visita ora:</p>
        <div class="numero-attuale" id="current-display">--</div>
        
        <div id="registration-section">
            <button id="btn-prendi" onclick="prendiNumero()">PRENDI NUMERO</button>
            <div id="reader-container">
                <div id="reader"></div>
                <button style="background:var(--danger); margin-top:10px;" onclick="chiudiScanner()">ANNULLA</button>
            </div>
        </div>

        <div id="status-section" style="display:none;">
            <div class="info-box" id="info-box-container">
                <p id="info-box-title" style="margin:0; font-size: 13px; font-weight: 600; color: #64748b;">IL TUO NUMERO</p>
                <div class="tuo-numero" id="my-number-display">--</div>
                <p id="msg-ora" style="display:none; margin:10px 0 0 0; font-weight: 900; font-size: 18px;">ENTRA ORA!</p>
            </div>
            <p id="wait-message" style="font-size: 15px; font-weight: 600; color: #475569;">Ti avviseremo qui.</p>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://motore-coda.motore-coda-admin.workers.dev";
        let audioCtx = null;
        let html5QrCode = null;
        const isFromQR = new URLSearchParams(window.location.search).has('qr');

        function sbloccaAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function suona() { 
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(); osc.stop(audioCtx.currentTime + 1);
        }

        async function aggiorna() {
            try {
                const res = await fetch(`${WORKER_URL}/status`);
                const data = await res.json();
                const savedSession = localStorage.getItem('session_id');
                const savedTicket = localStorage.getItem('paziente_ticket');

                if (savedSession && savedSession != data.sessionID) {
                    localStorage.clear();
                    location.href = window.location.pathname;
                    return;
                }

                document.getElementById('current-display').innerText = data.attuale || 0;
                const box = document.getElementById('info-box-container');
                const msg = document.getElementById('msg-ora');

                if (savedTicket) {
                    const mio = parseInt(savedTicket);
                    if (data.attuale === mio) {
                        if (!box.classList.contains('turno-attivo')) { suona(); document.title = "🔔 ENTRA!"; }
                        box.classList.add('turno-attivo');
                        msg.style.display = 'block';
                    } else {
                        box.classList.remove('turno-attivo');
                        msg.style.display = 'none';
                    }
                }
            } catch (e) {}
        }

        function apriScanner() {
            document.getElementById('btn-prendi').style.display = 'none';
            document.getElementById('reader-container').style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15 }, () => {
                html5QrCode.stop().then(() => { window.location.href = window.location.pathname + "?qr=1"; });
            }).catch(() => chiudiScanner());
        }

        function chiudiScanner() { if(html5QrCode) html5QrCode.stop(); location.reload(); }

        async function prendiNumero() {
            sbloccaAudio();
            if (!isFromQR) { apriScanner(); return; }
            try {
                const res = await fetch(`${WORKER_URL}/join`, { method: 'POST' });
                const data = await res.json();
                localStorage.setItem('paziente_ticket', data.tuoTurno);
                localStorage.setItem('session_id', data.sessionID);
                document.getElementById('my-number-display').innerText = data.tuoTurno;
                document.getElementById('registration-section').style.display = 'none';
                document.getElementById('status-section').style.display = 'block';
                suona();
            } catch(e) { alert("Errore di connessione."); }
        }

        window.onload = () => {
            if (localStorage.getItem('paziente_ticket')) {
                document.getElementById('my-number-display').innerText = localStorage.getItem('paziente_ticket');
                document.getElementById('registration-section').style.display = 'none';
                document.getElementById('status-section').style.display = 'block';
            }
            setInterval(aggiorna, 4000);
            aggiorna();
        };
    </script>
</body>
</html>
