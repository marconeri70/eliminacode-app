<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminacode Medico</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; width: 80%; max-width: 400px; }
        h1 { color: #2c3e50; }
        .numero-attuale { font-size: 80px; font-weight: bold; color: #e74c3c; margin: 20px 0; }
        .tuo-numero { font-size: 24px; color: #3498db; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Studio Medico</h1>
        <p>Stiamo servendo il numero:</p>
        <div class="numero-attuale" id="current">--</div>
        
        <hr>
        
        <div id="registration">
            <p>Non sei ancora in fila?</p>
            <button onclick="prendiNumero()">Prendi il mio numero</button>
        </div>

        <div id="status" style="display:none;">
            <p class="tuo-numero">Il tuo numero è: <b id="myNumber">--</b></p>
            <p id="wait-msg">Attendi il tuo turno...</p>
        </div>
    </div>

    <script>
        // Logica simulata (qui andrebbe il collegamento a Cloudflare R2 o Workers)
        let currentServing = 10; 
        
        function aggiornaDisplay() {
            document.getElementById('current').innerText = currentServing;
        }

        function prendiNumero() {
            // Simuliamo l'assegnazione di un numero (es. il successivo all'ultimo)
            const mioNumero = 15; 
            document.getElementById('myNumber').innerText = mioNumero;
            document.getElementById('registration').style.display = 'none';
            document.getElementById('status').style.display = 'block';
        }

        // Aggiorna il numero ogni 5 secondi (simulazione)
        setInterval(() => {
            // Qui faresti una "fetch" al tuo file su Cloudflare R2
            aggiornaDisplay();
        }, 5000);

        aggiornaDisplay();
    </script>
</body>
</html>
