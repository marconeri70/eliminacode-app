<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila - Dott. Giuseppe Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #0ea5e9; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(-45deg, #e0f2fe, #bae6fd, #f0fdf4, #e0f2fe); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: var(--primary); }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); width: 100%; max-width: 400px; text-align: center; }
        .numero-attuale { font-size: 85px; font-weight: 800; color: var(--danger); margin: 10px 0; line-height: 1; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        /* Box del numero */
        .info-box { background: rgba(255,255,255,0.9); padding: 25px; border-radius: 25px; margin: 30px 0; transition: all 0.4s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; }
        .tuo-numero { font-size: 45px; font-weight: 800; color: var(--accent); transition: all 0.3s ease; }

        /* Stile quando è il turno del paziente */
        .turno-attivo { background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; transform: scale(1.08); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.4) !important; animation: pulseTurno 1.5s infinite; }
        .turno-attivo #info-box-title { color: white !important; }
        .turno-attivo .tuo-numero { color: white !important; font-size: 80px; margin: 5px 0; line-height: 1; }
        
        /* Messaggio lampeggiante dentro il box verde */
        .messaggio-turno { display: none; color: white; font-size: 20px; font-weight: 900; text-transform: uppercase; margin-top: 10px; animation: blinker 1s linear infinite; }
        .turno-attivo .messaggio-turno { display: block !important; }
        
        @keyframes blinker { 50% { opacity: 0.3; } }
        @keyframes pulseTurno { 0% { transform: scale(1.05); } 50% { transform: scale(1.1); } 100% { transform: scale(1.05); } }
        
        button { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 20px 30px; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .avviso-schermo { font-size: 11px; color: #64748b; margin-top: 20px; font-weight: 600; }
        
        /* Modale per l'azzeramento */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: white; padding: 30px; border-radius: 24px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Studio Medico</h2>
        <h3>Dott. Giuseppe Martino</h3>
        <p style="margin-bottom: 5px; font-weight: 600;">Attualmente in visita:</p>
        <div class="numero-attuale" id="current-display">--</div>
        
        <div id="registration-section">
            <button onclick="prendiNumero()">PRENDI NUMERO</button>
        </div>

        <div id="status-section" style="display:none;">
            <div class="info-box" id="info-box-container">
                <p id="info-box-title" style="margin: 0; font-size: 14px; font-weight: 600; color: #64748b;">Il tuo turno è il numero</p>
                <div class="tuo-numero" id="my-number-display">--</div>
                <div class="messaggio-turno">È ORA IL TUO TURNO!</div>
            </div>
            <p id="wait-message" style="font-size: 14px; font-weight: 600; color: #475569;">Ti avviseremo quando entrare.</p>
            <div class="avviso-schermo">⚠️ Lo schermo resterà attivo da solo.</div>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <p id="modal-text"></p>
            <button onclick="chiudiModalReset()" style="padding: 12px 25px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer;">Ho capito</button>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://motore-coda.vocidicassino.workers.dev"; 
        let numeroPrecedente = -1;
        let wakeLock = null;

        async function mantieniSchermoSveglio() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function mostraModalReset(msg) {
            document.getElementById('modal-text').innerText = msg;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function chiudiModalReset() {
            document.getElementById('custom-modal').style.display = 'none';
            location.reload(); 
        }

        function suona() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                osc.start(); osc.stop(ctx.currentTime + 1);
            } catch(e) {}
        }

        async function aggiorna() {
            try {
                const res = await fetch(`${WORKER_URL}/status`); 
                const data = await res.json();
                document.getElementById('current-display').innerText = data.attuale || 0;

                const saved = localStorage.getItem('paziente_ticket');
                if (saved) {
                    const mio = parseInt(saved);
                    
                    if (data.ultimoAssegnato < mio) { 
                        localStorage.removeItem('paziente_ticket');
                        mostraModalReset("La fila è stata azzerata per il nuovo turno.");
                        return; 
                    }

                    const box = document.getElementById('info-box-container');
                    const wait = document.getElementById('wait-message');

                    if (data.attuale === mio) {
                        if (numeroPrecedente !== data.attuale) { suona(); document.title = "🔔 TOCCA A TE!"; }
                        box.classList.add('turno-attivo');
                        wait.style.display = "none";
                    } else {
                        box.classList.remove('turno-attivo');
                        wait.style.display = "block";
                        document.title = "Fila - Studio Medico";
                        if (data.attuale > mio) wait.innerText = "Il tuo turno è passato.";
                        else wait.innerText = "Ti avviseremo quando entrare.";
                    }
                }
                numeroPrecedente = data.attuale;
            } catch (e) {}
        }

        async function prendiNumero() {
            try {
                const res = await fetch(`${WORKER_URL}/join`, { method: 'POST' }); 
                const data = await res.json();
                localStorage.setItem('paziente_ticket', data.tuoTurno);
                document.getElementById('my-number-display').innerText = data.tuoTurno;
                document.getElementById('registration-section').style.display = 'none';
                document.getElementById('status-section').style.display = 'block';
                mantieniSchermoSveglio(); suona();
            } catch(e) { 
                mostraModalReset("Errore di connessione.");
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('paziente_ticket');
            if (saved) {
                document.getElementById('my-number-display').innerText = saved;
                document.getElementById('registration-section').style.display = 'none';
                document.getElementById('status-section').style.display = 'block';
            }
            aggiorna(); setInterval(aggiorna, 5000);
        };
    </script>
</body>
</html>
