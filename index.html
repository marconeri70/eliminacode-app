<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminacode Medico - Marconeri70</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f4f7f6; color: var(--primary); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 400px; }
        .numero-attuale { font-size: 72px; font-weight: bold; color: var(--danger); margin: 10px 0; }
        .info-box { background: #ecf0f1; padding: 15px; border-radius: 10px; margin: 20px 0; }
        .tuo-numero { font-size: 32px; font-weight: bold; color: var(--accent); }
        button { background: var(--success); color: white; border: none; padding: 18px 30px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; transition: transform 0.2s; }
        button:active { transform: scale(0.98); }
        .footer { margin-top: 20px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top:0;">Studio Medico</h2>
        <p>Attualmente stiamo servendo:</p>
        <div class="numero-attuale" id="current-display">--</div>
        
        <div id="registration-section">
            <p>Scansiona il QR e prendi il tuo posto:</p>
            <button onclick="prendiNumero()">PRENDI NUMERO</button>
        </div>

        <div id="status-section" style="display:none;">
            <div class="info-box">
                <p>Il tuo turno è il numero:</p>
                <div class="tuo-numero" id="my-number-display">--</div>
            </div>
            <p id="wait-message">Ti avviseremo quando sarà il tuo turno.</p>
        </div>
    </div>

    <p class="footer">Link App: marconeri70.github.io/eliminacode-app/</p>

    <script>
        const WORKER_URL = "https://motore-coda.vocidicassino.workers.dev"; 
        let numeroPrecedente = -1;

        window.onload = () => {
            const savedNumber = localStorage.getItem('paziente_ticket');
            if (savedNumber) {
                mostraStatoPaziente(savedNumber);
            }
            aggiornaNumeroCorrente();
            setInterval(aggiornaNumeroCorrente, 5000); 
        };

        function suonaCampanello() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(880, ctx.currentTime); 
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); 
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch(e) {
                console.log("Audio non supportato");
            }
        }

        async function aggiornaNumeroCorrente() {
            try {
                const res = await fetch(`${WORKER_URL}/status`);
                const data = await res.json();
                
                // Suona il campanello se il numero avanza
                if (numeroPrecedente !== -1 && data.attuale > numeroPrecedente) {
                    suonaCampanello();
                }
                
                numeroPrecedente = data.attuale;
                document.getElementById('current-display').innerText = data.attuale || 0;

                // --- LOGICA DI AZZERAMENTO AUTOMATICO ---
                const savedNumber = localStorage.getItem('paziente_ticket');
                
                // Se il paziente ha un numero (es. 5) ma il server dice che l'ultimo assegnato in assoluto è minore (es. 0),
                // significa che il medico ha resettato il sistema.
                if (savedNumber && data.ultimoAssegnato < parseInt(savedNumber)) {
                    // Cancella la memoria
                    localStorage.removeItem('paziente_ticket');
                    numeroPrecedente = -1;
                    
                    // Riporta l'interfaccia allo stato iniziale
                    document.getElementById('status-section').style.display = 'none';
                    document.getElementById('registration-section').style.display = 'block';
                    
                    // Avviso gentile (opzionale, ma utile)
                    alert("La fila è stata azzerata per il nuovo turno.");
                }

            } catch (e) {
                console.log("Errore aggiornamento dati");
            }
        }

        async function prendiNumero() {
            try {
                const res = await fetch(`${WORKER_URL}/join`, { method: 'POST' });
                const data = await res.json();
                
                const numeroAssegnato = data.tuoTurno;
                localStorage.setItem('paziente_ticket', numeroAssegnato);
                mostraStatoPaziente(numeroAssegnato);
                suonaCampanello();
            } catch (e) {
                alert("Errore di connessione. Riprova.");
            }
        }

        function mostraStatoPaziente(num) {
            document.getElementById('my-number-display').innerText = num;
            document.getElementById('registration-section').style.display = 'none';
            document.getElementById('status-section').style.display = 'block';
        }
    </script>
</body>
</html>
