<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Informatori - Studio Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-segnala { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .status-box { display: none; padding: 30px; border-radius: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; margin-top: 20px; }
        
        .chiamata-attiva { background: var(--accent) !important; border: none !important; animation: pulse 1.5s infinite; color: #422006; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        h1 { font-size: 22px; margin-bottom: 10px; }
        .avviso-testo { font-weight: 800; font-size: 26px; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Area Informatori</h1>
        <p id="desc">Segnala la tua presenza in segreteria per metterti in coda.</p>
        
        <button id="btn" class="btn-segnala" onclick="segnalaPresenza()">SEGNALA PRESENZA</button>

        <div id="status" class="status-box">
            <p id="status-text">Presenza inviata correttamente.<br><br><small>Riceverai un avviso sonoro quando il medico ti chiamerà.</small></p>
            <div id="avviso-chiamata" style="display:none;" class="avviso-testo">💼<br>È IL TUO TURNO!<br>ENTRA ORA</div>
        </div>
    </div>

    <script>
    const WORK_URL = "https://motore-coda.vocidicassino.workers.dev";
    let segnalato = false;
    let sessioneIniziale = null;
    let audioCtx = null; // Variabile globale audio per informatore

    function sbloccaAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function suonaInformatore() {
        if (!audioCtx) return;
        [440, 660, 880].forEach((freq, i) => { 
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.15));
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + (i * 0.15));
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.15) + 0.3);
            osc.start(audioCtx.currentTime + (i * 0.15));
            osc.stop(audioCtx.currentTime + (i * 0.15) + 0.3);
        });
    }

    async function segnalaPresenza() {
        sbloccaAudio(); // Sblocca l'audio al tocco dell'utente
        try {
            const res = await fetch(`${WORK_URL}/join-info`, { method: 'POST' });
            const data = await res.json();
            sessioneIniziale = data.sessionID;
            segnalato = true;
            document.getElementById('btn').style.display = 'none';
            document.getElementById('desc').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            setInterval(controllaChiamata, 4000);
        } catch(e) { alert("Errore di connessione al server."); }
    }

    async function controllaChiamata() {
        if (!segnalato) return;
        try {
            const res = await fetch(`${WORK_URL}/status`);
            const data = await res.json();

            // GESTIONE AZZERAMENTO MEDICO
            if (sessioneIniziale && data.sessionID != sessioneIniziale) {
                alert("⚠️ Il medico ha resettato la coda.\nLa tua prenotazione è stata annullata.");
                location.reload(); // Ricarica la pagina facendolo ripartire da zero
                return;
            }

            // GESTIONE CHIAMATA (infoInVisita)
            if (data.infoInVisita) {
                const box = document.getElementById('status');
                const avviso = document.getElementById('avviso-chiamata');
                const text = document.getElementById('status-text');
                
                if (avviso.style.display === 'none') {
                    box.classList.add('chiamata-attiva');
                    avviso.style.display = 'block';
                    text.style.display = 'none';
                    suonaInformatore(); // Fa suonare il telefono dell'informatore
                    segnalato = false; // Interrompe il loop del suono
                }
            }
        } catch(e) {}
    }
</script>
</body>
</html>
