<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Informatori - Studio Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        button { background: #0f172a; color: white; border: none; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; width: 100%; }
        .success { color: #10b981; display: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Area Informatori</h3>
        <p>Tocca il tasto per segnalare la tua presenza al Dottore.</p>
        <button id="btn" onclick="segnalaPresenza()">SEGNALA PRESENZA</button>
        <p id="msg" class="success">✅ Presenza segnalata!<br>Attendi il tuo turno.</p>
    </div>
    <script>
        async function segnalaPresenza() {
            await fetch('https://motore-coda.vocidicassino.workers.dev/join-info', { method: 'POST' });
            document.getElementById('btn').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
        }
    </script>
</body>
</html>
