<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Informatori - Studio Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --success: #10b981; }
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .btn-segnala { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .status-box { display: none; padding: 20px; border-radius: 15px; background: #f8fafc; border: 2px dashed #cbd5e1; margin-top: 20px; }
        .chiamata-attiva { background: var(--accent) !important; border: none !important; animation: pulse 1.5s infinite; color: #422006; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        h1 { font-size: 22px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Area Informatori</h1>
        <p id="desc">Segnala la tua presenza in segreteria.</p>
        
        <button id="btn" class="btn-segnala" onclick="segnalaPresenza()">SEGNALA PRESENZA</button>

        <div id="status" class="status-box">
            <p id="status-text">Presenza inviata.<br>Attendi qui o in sala d'attesa.</p>
            <div id="avviso-chiamata" style="display:none; font-weight:800; font-size:24px;">ENTRA ORA! 💼</div>
        </div>
    </div>

    <script>
        const WORK_URL = "https://motore-coda.vocidicassino.workers.dev";
        let segnalato = false;
        let conteggioIniziale = 0;

        function suona() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }

        async function segnalaPresenza() {
            const res = await fetch(`${WORK_URL}/join-info`, { method: 'POST' });
            const status = await fetch(`${WORK_URL}/status`);
            const data = await status.json();
            
            conteggioIniziale = data.informatori;
            segnalato = true;

            document.getElementById('btn').style.display = 'none';
            document.getElementById('desc').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            
            // Inizia a controllare se il medico lo chiama
            setInterval(controllaChiamata, 4000);
        }

        async function controllaChiamata() {
            if (!segnalato) return;
            const res = await fetch(`${WORK_URL}/status`);
            const data = await res.json();

            // Se il numero di informatori è sceso, significa che il medico ha cliccato "Fa entrare"
            if (data.informatori < conteggioIniziale) {
                const box = document.getElementById('status');
                const avviso = document.getElementById('avviso-chiamata');
                const text = document.getElementById('status-text');
                
                box.classList.add('chiamata-attiva');
                avviso.style.display = 'block';
                text.style.display = 'none';
                suona();
                segnalato = false; // Ferma il controllo
            }
        }
    </script>
</body>
</html>
