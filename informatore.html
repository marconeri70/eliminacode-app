<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatori - Studio Martino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fffcf0; --primary: #451a03; --accent: #f59e0b; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 35px; box-shadow: 0 20px 40px rgba(69, 26, 3, 0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #fef3c7; }
        .btn-segnala { background: var(--primary); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 18px; font-weight: 700; width: 100%; cursor: pointer; }
        .status-box { display: none; padding: 35px; border-radius: 25px; background: #fffbeb; border: 2px dashed #fde68a; margin-top: 20px; }
        .chiamata-attiva { 
            background: linear-gradient(135deg, #f59e0b, #d97706) !important; 
            animation: pulse 1.5s infinite; 
            color: white !important;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        .avviso-testo { font-weight: 900; font-size: 28px; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="font-size: 20px; color: var(--primary);">Area Informatori</h1>
        <p id="desc" style="color: #92400e; font-weight: 500;">Segnala la tua presenza in segreteria.</p>
        <button id="btn" class="btn-segnala" onclick="segnala()">SEGNALA PRESENZA</button>

        <div id="status" class="status-box">
            <p id="status-text" style="font-weight: 600;">Presenza registrata.<br><small>Attendi la chiamata.</small></p>
            <div id="avviso-chiamata" style="display:none;" class="avviso-testo">💼<br>TOCCA A TE!<br>ENTRA ORA</div>
        </div>
    </div>

    <script>
        const WORK_URL = "https://motore-coda.motore-coda-admin.workers.dev";
        let audioCtx = null;
        let chiamato = false;
        const isFromQR = new URLSearchParams(window.location.search).has('qr');

        function suona() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            [440, 660, 880].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime + (i*0.1));
                g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                o.start(audioCtx.currentTime + (i*0.1)); o.stop(audioCtx.currentTime + 0.5);
            });
        }

        async function segnala() {
            if (!isFromQR) { alert("Usa il QR fisico."); return; }
            try {
                const res = await fetch(`${WORK_URL}/join-info`, { method: 'POST' });
                const data = await res.json();
                localStorage.setItem('info_session', data.sessionID);
                document.getElementById('btn').style.display = 'none';
                document.getElementById('desc').style.display = 'none';
                document.getElementById('status').style.display = 'block';
                setInterval(check, 3000);
            } catch(e) { alert("Errore connessione."); }
        }

        async function check() {
            try {
                const res = await fetch(`${WORK_URL}/status`);
                const data = await res.json();
                if (localStorage.getItem('info_session') != data.sessionID) location.href = window.location.pathname;
                if (data.infoInVisita && !chiamato) {
                    document.getElementById('status').classList.add('chiamata-attiva');
                    document.getElementById('status-text').style.display = 'none';
                    document.getElementById('avviso-chiamata').style.display = 'block';
                    suona(); chiamato = true;
                }
                if (chiamato && !data.infoInVisita) {
                    localStorage.removeItem('info_session');
                    location.href = window.location.pathname;
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
